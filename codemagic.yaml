# Codemagic CI/CD 設定 — Mac を持たずに iOS アプリをビルドし TestFlight へ配信する。
# https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# ▼ 事前にやること(Codemagic / App Store Connect の画面で1回だけ):
#   1. Apple Developer Program($99/年)に登録済みであること。
#   2. App Store Connect で新規アプリを作成し、Bundle ID を
#      「com.motopark.motopark」で登録する。
#      作成後に表示される数値の Apple ID を、下の APP_STORE_APPLE_ID に入れる。
#   3. Codemagic にこのリポジトリ(GitHub等)を接続する。
#   4. Codemagic の Team settings → Integrations → App Store Connect で
#      API キーを登録し、その名前を「codemagic」にする(下の integrations と一致させる)。
#
# ▼ 準備が済んだら Codemagic で「Start new build」→ ios-testflight を選ぶだけ。
#   クラウドの Mac がビルドし、自動で TestFlight にアップロードされる。

workflows:
  # ───────────────────────────────────────────────────────────────────────
  # 【無料ルート】Apple Developer登録なしで使える「署名なしビルド」。
  # 生成された未署名 .ipa を Windows の Sideloadly で無料Apple IDを使って
  # iPhone にインストールする(7日間有効。期限が切れたら入れ直す)。
  # Codemagic 側に Apple アカウント連携は不要。Start build するだけ。
  # ───────────────────────────────────────────────────────────────────────
  ios-unsigned:
    name: iOS Unsigned IPA (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter パッケージ取得
        script: flutter pub get
      - name: CocoaPods インストール
        script: find . -name "Podfile" -execdir pod install \;
      - name: 署名なしでビルド
        script: flutter build ios --release --no-codesign
      - name: Runner.app を .ipa にパッケージ
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r motopark-unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/motopark-unsigned.ipa

  # ───────────────────────────────────────────────────────────────────────
  # 【有料ルート】Apple Developer Program($99/年)が必要。TestFlight配信。
  # ───────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Codemagic UI で登録した App Store Connect API キーの名前。
      app_store_connect: codemagic
    environment:
      ios_signing:
        # 自動署名(App Store配布用)。証明書/プロビジョニングはCodemagicが生成する。
        distribution_type: app_store
        bundle_identifier: com.motopark.motopark
      vars:
        # ↓ App Store Connect でアプリ作成後に表示される数値の Apple ID に置き換える。
        APP_STORE_APPLE_ID: 0000000000
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter パッケージ取得
        script: flutter pub get
      - name: CocoaPods インストール
        script: find . -name "Podfile" -execdir pod install \;
      - name: 署名プロファイル適用
        script: xcode-project use-profiles
      - name: iOS リリースビルド(ipa生成)
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log
    publishing:
      app_store_connect:
        # ビルド成果物を TestFlight へ自動アップロードする。
        auth: integration
        submit_to_testflight: true
