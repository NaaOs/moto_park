<!DOCTYPE html>
<html lang="ja">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="全国のバイク駐輪場を地図で探せるアプリ">

  <!-- モバイル(iOS/Android)で正しい縮尺で表示するためのビューポート設定。
       これが無いとモバイルブラウザがデスクトップ幅で描画され極小表示になる。
       ※ viewport-fit=cover と status-bar-style=black-translucent の併用は、
         iOSホーム画面PWAでタップ位置がステータスバー分ずれる不具合の原因に
         なるため使用しない。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A6B66">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- default にすることでコンテンツがステータスバーの下に配置され、
       Flutter Webのタッチ座標とのズレを防ぐ。 -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MotoPark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>motopark</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API。
       APIキーはリポジトリに含めず、ビルド時に __GOOGLE_MAPS_API_KEY__ を
       実際のキーへ置換して注入する(GitHub Actions が Secrets から差し込む)。
       ローカルでWeb版を試す場合は、このプレースホルダを一時的に自分のキーへ
       書き換える(コミットはしないこと)。 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VMGXNWNWCJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-VMGXNWNWCJ');
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
